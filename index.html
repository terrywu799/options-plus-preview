const TEMPLATES=[

  {id:2,name:'Meeting prep',  apps:['zoom','notion'],           steps:['Open Zoom','Open Notion'],                       tag:'Productivity', shortcut:['\u2325','\u2318','M']},

  {id:4,name:'Research mode', apps:['chrome','figma','notion'], steps:['Open Chrome','Open Figma','Open Notion'],        tag:'Productivity', shortcut:['\u2325','\u2318','R']},
  {id:5,name:'Music + browse',apps:['spotify','chrome'],        steps:['Play Spotify','Open Chrome'],                    tag:'Leisure',      shortcut:['\u2325','\u2318','P']},
  {id:6,name:'Design review', apps:['zoom','figma','chrome'],   steps:['Open Zoom','Open Figma','Open Chrome'],          tag:'Productivity', shortcut:['\u2325','\u2318','V']},
];
/* ─── Shortcut recording modal ──────────────────── */
const MOD_CODES=new Set(['ControlLeft','ControlRight','AltLeft','AltRight','ShiftLeft','ShiftRight','MetaLeft','MetaRight']);
function formatKey(e){
  const c=e.code;
  if(c.startsWith('Key')) return c.slice(3);
  if(c.startsWith('Digit')) return c.slice(5);
  if(c.startsWith('Numpad')) return 'Num '+c.slice(6);
  if(c.startsWith('Arrow')) return c.slice(5);
  if(/^F\d+$/.test(c)) return c;
  const m={Space:'Space',Enter:'Enter',Tab:'Tab',Escape:'Esc',Backspace:'Backspace',
    Minus:'-',Equal:'=',BracketLeft:'[',BracketRight:']',Backslash:'\\',
    Semicolon:';',Quote:"'",Comma:',',Period:'.',Slash:'/',Backquote:'`'};
  return m[c]||c;
}
const MOD_SYM={meta:'\u2318',alt:'\u2325',ctrl:'\u2303',shift:'\u21E7'};
function formatCombo({meta,ctrl,alt,shift,key}){
  const p=[];
  if(meta)p.push(MOD_SYM.meta);
  if(ctrl)p.push(MOD_SYM.ctrl);
  if(alt)p.push(MOD_SYM.alt);
  if(shift)p.push(MOD_SYM.shift);
  if(key)p.push(key);
  return p.join(' ');
}
function modCount({meta,ctrl,alt,shift}){
  return (meta?1:0)+(ctrl?1:0)+(alt?1:0)+(shift?1:0);
}
function ShortcutModal({accent,initial,onConfirm,onCancel}){
  const [combo,setCombo]=useState(()=>initial||{meta:false,ctrl:false,alt:false,shift:false,key:null});
  const [recording,setRecording]=useState(false);
  const boxRef=useRef(null);
  useEffect(()=>{
    if(!recording) return;
    const onKeyDown=(e)=>{
      e.preventDefault(); e.stopPropagation();
      if(e.code==='Escape'){setRecording(false);return;}
      const meta=e.metaKey, ctrl=e.ctrlKey, alt=e.altKey, shift=e.shiftKey;
      if(MOD_CODES.has(e.code)){setCombo(p=>({...p,meta,ctrl,alt,shift}));return;}
      const key=formatKey(e);
      const mods=(meta?1:0)+(ctrl?1:0)+(alt?1:0)+(shift?1:0);
      if(mods>3) return;
      if(mods>=1&&key){setCombo({meta,ctrl,alt,shift,key});setRecording(false);}
    };
    window.addEventListener('keydown',onKeyDown,true);
    return ()=>window.removeEventListener('keydown',onKeyDown,true);
  },[recording]);
  useEffect(()=>{
    const onDown=(e)=>{ if(boxRef.current&&!boxRef.current.contains(e.target)) onCancel(); };
    window.addEventListener('mousedown',onDown);
    return ()=>window.removeEventListener('mousedown',onDown);
  },[onCancel]);
  const display=formatCombo(combo);
  const valid=combo.key&&modCount(combo)>=1&&modCount(combo)<=3;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:100,
      display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .2s ease'}}>
      <div ref={boxRef} style={{width:420,background:S2,border:`1px solid ${BDR}`,borderRadius:12,
        padding:28,boxShadow:'0 20px 60px rgba(0,0,0,.8), 0 0 40px rgba(0,0,0,.5)'}}>
        <p style={{fontSize:13,color:T1,lineHeight:1.55,marginBottom:20}}>
          Shortcut should consist of up to 3 modifier keys (⌘ Cmd, ⌥ Option, ⌃ Ctrl, ⇧ Shift) and one other key.
          This shortcut will override OS shortcut.
        </p>
        <div style={{position:'relative',marginBottom:24}}>
          <button onClick={()=>setRecording(true)} style={{width:'100%',
            background:recording?accent+'14':S2,border:`1px solid ${recording?accent:BDR}`,
            borderRadius:8,padding:display?'14px 44px 14px 16px':'14px 16px',color:display?T1:T4,fontSize:14,
            fontFamily:'inherit',textAlign:'left',cursor:'pointer',
            transition:'border-color .15s, background .15s'}}>
            {recording?(display||'Press a combination…'):(display||'Click to record shortcut')}
          </button>
          {display&&<button onClick={e=>{e.stopPropagation();
            setCombo({meta:false,ctrl:false,alt:false,shift:false,key:null});setRecording(false);}}
            aria-label="Clear shortcut" style={{position:'absolute',top:'50%',right:10,transform:'translateY(-50%)',
              width:22,height:22,borderRadius:'50%',background:S3,border:'none',color:T2,fontSize:14,
              lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
              fontFamily:'inherit',padding:0,transition:'background .15s, color .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='#4a4a4a';e.currentTarget.style.color=T1;}}
            onMouseLeave={e=>{e.currentTarget.style.background=S3;e.currentTarget.style.color=T2;}}>
            ×
          </button>}
        </div>
        <button onClick={()=>valid&&onConfirm(display,combo)} disabled={!valid} style={{
          width:'100%',background:accent,color:'#000',border:'none',borderRadius:8,
          padding:'14px 0',fontSize:13,fontWeight:700,letterSpacing:'0.1em',fontFamily:'inherit',
          cursor:valid?'pointer':'not-allowed',opacity:valid?1:0.45,marginBottom:10,transition:'opacity .15s'}}>
          CONFIRM
        </button>
        <button onClick={onCancel} style={{width:'100%',background:'transparent',color:T1,
          border:`1px solid ${BDR}`,borderRadius:8,padding:'14px 0',fontSize:13,fontWeight:700,
          letterSpacing:'0.1em',fontFamily:'inherit',cursor:'pointer'}}>
          CANCEL
        </button>
      </div>
    </div>
  );
}

/* ─── Try-it modal ───────────────────────────────── */
function KeyCap({children,highlight}){
  return <div style={{minWidth:44,height:44,padding:'0 12px',borderRadius:8,
    background:highlight?'#3a3a3a':'#2a2a2a',
    border:`1px solid ${highlight?'#555':'#3a3a3a'}`,
    boxShadow:'inset 0 -2px 0 rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.04)',
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:16,fontWeight:600,color:T1,fontFamily:'inherit',
    transition:'background .15s'}}>{children}</div>;
}
function comboToCaps(c){
  if(!c) return [];
  const caps=[];
  if(c.meta)caps.push(MOD_SYM.meta);
  if(c.ctrl)caps.push(MOD_SYM.ctrl);
  if(c.alt)caps.push(MOD_SYM.alt);
  if(c.shift)caps.push(MOD_SYM.shift);
  if(c.key)caps.push(c.key);
  return caps;
}
function TryItModal({accent,trigger,combo,steps,onClose}){
  const [status,setStatus]=useState('waiting');
  const [error,setError]=useState(false);
  const boxRef=useRef(null);
  const isKeyboard=!!combo&&!!combo.key;
  useEffect(()=>{
    const onDown=(e)=>{ if(boxRef.current&&!boxRef.current.contains(e.target)) onClose(); };
    window.addEventListener('mousedown',onDown);
    return ()=>window.removeEventListener('mousedown',onDown);
  },[onClose]);
  useEffect(()=>{
    if(status!=='waiting'||!isKeyboard) return;
    const onKey=(e)=>{
      if(e.code==='Escape') return;
      if(MOD_CODES.has(e.code)) return;
      e.preventDefault(); e.stopPropagation();
      const match=e.metaKey===!!combo.meta&&e.ctrlKey===!!combo.ctrl&&
        e.altKey===!!combo.alt&&e.shiftKey===!!combo.shift&&
        formatKey(e)===combo.key;
      if(match){setError(false);setStatus('success');}
      else{setError(true);}
    };
    window.addEventListener('keydown',onKey,true);
    return ()=>window.removeEventListener('keydown',onKey,true);
  },[status,isKeyboard,combo]);
  const caps=isKeyboard?comboToCaps(combo):[trigger];
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:100,
      display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .2s ease'}}>
      <div ref={boxRef} style={{width:460,background:S2,border:`1px solid ${BDR}`,borderRadius:12,
        padding:28,boxShadow:'0 20px 60px rgba(0,0,0,.8), 0 0 40px rgba(0,0,0,.5)'}}>
        {status==='waiting'&&<>
          <div style={{fontSize:18,fontWeight:700,color:T1,marginBottom:8,letterSpacing:'-.01em'}}>
            Try your Smart Action
          </div>
          <p style={{fontSize:13,color:T2,lineHeight:1.55,marginBottom:22}}>
            {isKeyboard?'Press your trigger shortcut to preview:':'Click to simulate your trigger:'}
          </p>
          <div onClick={()=>{if(!isKeyboard)setStatus('success');}}
            style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,
              padding:'26px 16px',background:S1,borderRadius:10,
              border:`1px solid ${error?'#ff6b00':BDR}`,marginBottom:14,
              cursor:isKeyboard?'default':'pointer',transition:'border-color .2s'}}>
            {caps.map((cap,i)=><KeyCap key={i} highlight={error}>{cap}</KeyCap>)}
          </div>
          <div style={{fontSize:12,color:error?'#ff6b00':T3,textAlign:'center',
            marginBottom:18,minHeight:18,transition:'color .2s'}}>
            {error?"That's not your shortcut. Try again.":''}
          </div>
          <div style={{fontSize:11,color:T4,textAlign:'center',lineHeight:1.5}}>
            This is for prototype demo — no real system action will run.
          </div>
        </>}
        {status==='success'&&<>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:accent,color:'#000',
              fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>✓</div>
            <div style={{fontSize:18,fontWeight:700,color:T1,letterSpacing:'-.01em'}}>
              Your Smart Action is working.
            </div>
          </div>
          <div style={{padding:'14px 16px',background:`${accent}12`,border:`1px solid ${accent}33`,
            borderRadius:10,color:accent,fontSize:13,lineHeight:1.55,marginBottom:12}}>
            ✓ {(steps||[]).join(' → ')}
          </div>
          <div style={{padding:12,background:S2,border:`1px solid ${BDR}`,borderRadius:8,marginBottom:22}}>
            <div style={{fontSize:11,color:T2,marginBottom:4}}>Prototype demo</div>
            <div style={{fontSize:12,color:T1,lineHeight:1.5}}>
              In a real product, I'd launch your apps automatically right now. But this is a prototype demo — the actual automation isn't built yet.
            </div>
          </div>
          <button onClick={onClose} style={{width:'100%',background:accent,color:'#000',
            border:'none',borderRadius:8,padding:'14px 0',fontSize:13,fontWeight:700,
            letterSpacing:'0.1em',fontFamily:'inherit',cursor:'pointer'}}>
            CLOSE
          </button>
        </>}
      </div>
    </div>
  );
}

  const url=`https://www.google.com/s2/favicons?domain=${a.domain}&sz=${size*2}`;
  return <div style={{width:size,height:size,borderRadius:Math.round(size*.22),
    background:'#1e1e1e',border:'1px solid #2e2e2e',
    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>
    {!err
      ? <img src={url} width={size*.7} height={size*.7} onError={()=>setErr(true)}
          style={{objectFit:'contain'}}/>
      : <span style={{fontSize:size*.38,fontWeight:700,color:'#fff'}}>{a.name[0]}</span>

    if(!demoTip) return;

  },[demoTip]);

        </p>

          <button style={{display:'flex',alignItems:'center',gap:8,height:20,

            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style={{display:'block'}}>
              <path d="M4.17 10h11.66" stroke="#fff" strokeOpacity="0.9" strokeWidth="1.67" strokeLinecap="round"/>
              <path d="M10 4.17v11.66" stroke="#fff" strokeOpacity="0.9" strokeWidth="1.67" strokeLinecap="round"/>
            </svg>
            <span style={{fontSize:14,fontWeight:500,lineHeight:'20px',letterSpacing:'0.55px',

          </button>

          <div style={{width:1,height:24,background:'rgba(255,255,255,0.6)',flexShrink:0}}/>

          {/* Smart Action — highlighted (prototype affordance) */}
          <div style={{position:'relative'}}>
            <div onClick={onEnter} style={{width:24,height:24,display:'flex',alignItems:'center',
              justifyContent:'center',color:accent,cursor:'pointer',
              filter:`drop-shadow(0 0 8px ${accent}66)`}}>
              <svg width="24" height="24" viewBox="0 0 22 24" fill="none" style={{overflow:'visible',display:'block'}}>
                <path d="M7.3 12.45L9.97 15.45L15.3 8.85" stroke="currentColor" strokeOpacity="0.95"
                  strokeWidth="1.67" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M9.77 0.35c-0.04-0.25 0.23-0.44 0.45-0.3l3.2 1.98c0.15 0.1 0.18 0.31 0.07 0.45l-2.42 2.88c-0.17 0.2-0.49 0.11-0.53-0.14l-0.19-1.17c-4.67 0.33-8.36 4.22-8.36 8.98 0 4.97 4.03 9 9 9s9-4.03 9-9c0-0.55 0.45-1 1-1s1 0.45 1 1c0 6.07-4.92 11-11 11S0 19.09 0 13.01C0 7.26 4.41 2.54 10.04 2.06L9.77 0.35z"
                  fill="currentColor" fillOpacity="0.95"/>
              </svg>
            </div>
            {tip&&<div onClick={onEnter} style={{position:'absolute',top:34,right:-4,background:accent,
              borderRadius:9,padding:'10px 18px',color:'#000',fontSize:13,fontWeight:700,
              whiteSpace:'nowrap',zIndex:50,animation:'fadeUp .3s ease',cursor:'pointer',
              boxShadow:`0 6px 24px ${accent}55`}}>
              ✦ &nbsp;Try Smart Actions
              <div style={{position:'absolute',top:-5,right:13,width:9,height:9,background:accent,transform:'rotate(45deg)',borderRadius:2}}/>
            </div>}
          </div>

          {/* AI Builder sparkle — dark tooltip on click */}

/* ─── Flow A: Onboarding ──────────────────────── */
function OnboardingFlow({onComplete,onBack,accent}){
  const [step,setStep]=useState(1);
  const [sel,setSel]=useState(new Set([]));
  const [role,setRole]=useState(null);
  const [pct,setPct]=useState(0);
  const [scanning,setScanning]=useState(false);

  // Role → default apps mapping
  const ROLE_APPS={
    designer: new Set(['chrome','figma','spotify','zoom','notion']),
    developer:new Set(['chrome','edge','notion','zoom','notepad']),
    general:  new Set(['chrome','edge','zoom','notion','settings']),
  };

  const startScan=()=>{
    setScanning(true);
    let p=0;
    const iv=setInterval(()=>{
      p+=9+Math.random()*8;
      setPct(Math.min(p,100));
      if(p>=100){clearInterval(iv);setTimeout(()=>setStep(2),350);}
    },90);
  };
  const toggle=id=>setSel(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const pickRole=r=>{setRole(r);setSel(new Set(ROLE_APPS[r]));};
  const generate=()=>{setStep(4);};

  const STEP_LABELS=['Scan apps','Your role','Confirm apps'];
  const Progress=()=>null; // steps live in Shell header

  const Shell=({children})=>(
    <div style={{height:'100vh',background:BG,display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'0 36px',height:72,borderBottom:`1px solid ${BDR}`,flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div onClick={onBack} style={{width:20,height:20,display:'flex',alignItems:'center',
            justifyContent:'center',cursor:'pointer'}}>
            <img src="assets/icon-back.svg" width="19.77" height="20" alt="Back" style={{display:'block'}}/>
          </div>
          <span style={{fontSize:18,fontWeight:700,color:T1,letterSpacing:'-.03em'}}>Smart Actions Setup</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {STEP_LABELS.map((label,i)=>{
            const idx=i+1,active=step===idx,done=step>idx;
            return(
              <React.Fragment key={idx}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',
                    justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0,transition:'all .3s',
                    background:done?accent:active?accent+'22':S2,
                    color:done?'#000':active?accent:T3,
                    border:`1.5px solid ${done||active?accent:BDR}`}}>
                    {done?'✓':idx}
                  </div>
                  <span style={{fontSize:13,fontWeight:active?600:400,color:active?T1:done?T2:T3,transition:'color .3s'}}>
                    {label}
                  </span>
                </div>
                {idx<3&&<div style={{width:36,height:1,background:done?accent:BDR,transition:'background .4s',margin:'0 4px'}}/>}
              </React.Fragment>
            );
          })}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column',alignItems:'center',
        justifyContent:'center',padding:'52px 48px'}}>
        {children}
      </div>
    </div>
  );

  if(step===1) return(
    <Shell>
      <div style={{maxWidth:640,width:'100%',textAlign:'center'}}>
        <Progress/>
        <div style={{fontSize:56,marginBottom:24,color:accent}}>✦</div>
        <div style={{fontSize:12,fontWeight:600,color:accent,letterSpacing:'.1em',textTransform:'uppercase',marginBottom:16}}>Smart Actions Setup</div>
        <h2 style={{fontSize:38,fontWeight:700,letterSpacing:'-.04em',lineHeight:1.2,marginBottom:20}}>
          Let's build your personal workspace
        </h2>
        <p style={{color:T2,fontSize:16,lineHeight:1.8,marginBottom:48,maxWidth:540,margin:'0 auto 48px'}}>
          We'll scan your installed apps to create templates that match your actual workflow. No generic setups — just what's relevant to you.
        </p>
        {scanning?(
          <div style={{maxWidth:400,margin:'0 auto'}}>
            <div style={{height:3,background:S3,borderRadius:2,marginBottom:16,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct}%`,background:accent,borderRadius:2,transition:'width .08s'}}/>
            </div>
            <div style={{fontSize:13,color:T2}}>Scanning installed apps… {Math.round(pct)}%</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
            <PBtn ac={accent} onClick={startScan} style={{padding:'14px 48px',fontSize:15}}>Scan my apps</PBtn>
            <div style={{fontSize:12,color:T3}}>We only read app names. No data is collected.</div>
          </div>
        )}
      </div>
    </Shell>
  );

  if(step===2){
    const roles=[
      {id:'designer', icon:'🎨',label:'Designer',     sub:'Figma, creative tools, visual work',
       tags:['Figma','Chrome','Spotify']},
      {id:'developer',icon:'💻',label:'Developer',    sub:'Code editors, terminals, repos',
       tags:['VS Code','Terminal','Chrome']},
      {id:'general',  icon:'📋',label:'General office',sub:'Docs, email, meetings',
       tags:['Outlook','Teams','Chrome']},
    ];
    return(
      <Shell>
        <div style={{maxWidth:820,width:'100%'}}>
          <div style={{marginBottom:36}}>
            <h2 style={{fontSize:28,fontWeight:700,letterSpacing:'-.04em',marginBottom:8}}>What best describes your work?</h2>
            <p style={{color:T2,fontSize:15}}>We'll pre-select the most relevant apps for your role.</p>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:36}}>
            {roles.map(r=>(
              <div key={r.id} onClick={()=>pickRole(r.id)} style={{
                padding:'32px 28px',borderRadius:14,cursor:'pointer',transition:'all .18s',
                border:`2px solid ${role===r.id?accent:BDR}`,
                background:role===r.id?accent+'0d':S1,position:'relative'}}>
                {role===r.id&&<div style={{position:'absolute',top:18,right:18,width:24,height:24,
                  borderRadius:'50%',background:accent,display:'flex',alignItems:'center',
                  justifyContent:'center',fontSize:13,color:'#000',fontWeight:700}}>✓</div>}
                <div style={{fontSize:40,marginBottom:18}}>{r.icon}</div>
                <div style={{fontSize:20,fontWeight:700,marginBottom:8,letterSpacing:'-.02em'}}>{r.label}</div>
                <div style={{fontSize:14,color:T2,lineHeight:1.55,marginBottom:18}}>{r.sub}</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {r.tags.map(t=><span key={t} style={{fontSize:11,padding:'3px 9px',borderRadius:4,
                    background:S3,color:T3,fontWeight:500}}>{t}</span>)}
                </div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',justifyContent:'flex-end'}}>
            <PBtn ac={accent} onClick={()=>setStep(3)} disabled={!role} style={{padding:'12px 40px',fontSize:14}}>
              Continue →
            </PBtn>
          </div>
        </div>
      </Shell>
    );
  }

  if(step===3) return(
    <Shell>
      <div style={{maxWidth:820,width:'100%'}}>
        <div style={{marginBottom:28}}>
          <h2 style={{fontSize:28,fontWeight:700,letterSpacing:'-.04em',marginBottom:8}}>Confirm your apps</h2>
          <p style={{color:T2,fontSize:15}}>
            We've pre-selected apps based on your role — feel free to adjust.
          </p>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:12,marginBottom:28}}>
          {APPS_LIST.map(app=>{
            const on=sel.has(app.id);
            return(
              <div key={app.id} onClick={()=>toggle(app.id)} style={{
                padding:'18px 10px 14px',borderRadius:12,cursor:'pointer',textAlign:'center',
                border:`1.5px solid ${on?accent:BDR}`,background:on?accent+'0e':S1,
                transition:'all .15s',position:'relative'}}>
                {on&&<div style={{position:'absolute',top:8,right:8,width:8,height:8,borderRadius:'50%',background:accent}}/>}
                <div style={{display:'flex',justifyContent:'center',marginBottom:10}}><AppDot appId={app.id} size={32}/></div>
                <div style={{fontSize:12,fontWeight:500,color:on?T1:T2,lineHeight:1.3}}>{app.name}</div>
              </div>
            );
          })}
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:13,color:T2}}>{sel.size} apps selected</span>
          <PBtn ac={accent} onClick={generate} disabled={sel.size===0} style={{padding:'12px 36px',fontSize:14}}>
            Generate my templates →
          </PBtn>
        </div>
      </div>
    </Shell>
  );

  // ── Generating transition (step 4) ──────────────────────
  const GenScreen=()=>{
    const [pct2,setPct2]=useState(0);
    const [phase,setPhase]=useState(0);
    const [shown,setShown]=useState([]);
    const selectedApps=[...sel];
    const PHASES=[
      'Scanning your installed apps…',
      'Matching templates to your tools…',
      'Customising for your role…',
      'Finalising your workspace…',
    ];
    useEffect(()=>{
      // Progress bar over 3.6s
      const start=Date.now();
      const dur=3600;
      const raf=setInterval(()=>{
        const t=Math.min((Date.now()-start)/dur,1);
        setPct2(Math.round(t*100));
        setPhase(Math.floor(t*PHASES.length*0.99));
        if(t>=1){ clearInterval(raf); setTimeout(()=>onComplete(role),400); }
      },40);
      // Stagger app icons
      selectedApps.forEach((id,i)=>{
        setTimeout(()=>setShown(p=>[...p,id]),300+i*260);
      });
      return()=>clearInterval(raf);
    },[]);
    return(
      <Shell>
        <div style={{maxWidth:560,width:'100%',textAlign:'center'}}>
          <div style={{fontSize:52,color:accent,marginBottom:24,
            animation:'pulse 1.4s ease infinite'}}>✦</div>
          <h2 style={{fontSize:28,fontWeight:700,letterSpacing:'-.04em',marginBottom:10}}>
            Building your workspace
          </h2>
          <p style={{fontSize:15,color:T2,marginBottom:40,minHeight:24,transition:'opacity .4s'}}>
            {PHASES[phase]||PHASES[PHASES.length-1]}
          </p>
          {/* app icons appearing */}
          {selectedApps.length>0&&(
            <div style={{display:'flex',justifyContent:'center',gap:12,marginBottom:40,flexWrap:'wrap'}}>
              {selectedApps.map((id,i)=>(
                <div key={id} style={{
                  display:'flex',flexDirection:'column',alignItems:'center',gap:6,
                  opacity:shown.includes(id)?1:0,
                  transform:shown.includes(id)?'translateY(0)':'translateY(8px)',
                  transition:'opacity .4s ease, transform .4s ease'}}>
                  <AppDot appId={id} size={40}/>
                  <span style={{fontSize:10,color:T3}}>{APP_MAP[id]?.name}</span>
                </div>
              ))}
            </div>
          )}
          {/* progress bar */}
          <div style={{height:3,background:S3,borderRadius:2,overflow:'hidden',maxWidth:360,margin:'0 auto'}}>
            <div style={{height:'100%',background:accent,borderRadius:2,
              width:`${pct2}%`,transition:'width .1s linear'}}/>
          </div>
          <div style={{marginTop:12,fontSize:12,color:T3}}>{pct2}%</div>
        </div>
      </Shell>
    );
  };

  return <GenScreen/>;
}

              onEdit={onOpenAI}/>)}
          </div>
        </div>
      </div>
    </div>
  );

/* 28×28 app tile used in ActionCard */
function AppTile({appId}){
  const a=APP_MAP[appId]||{bg:'#444',domain:'google.com',name:'?'};
  const [err,setErr]=useState(false);
  const url=`https://www.google.com/s2/favicons?domain=${a.domain}&sz=64`;
  return <div style={{width:28,height:28,borderRadius:4,background:'#2a2a2a',
    display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>

function isKeyboardTrigger(t){
  return !!t && (t.startsWith('Keyboard') || /[\u2318\u2325\u2303\u21E7]/.test(t) || /(Ctrl|Alt|Shift)\s*\+/.test(t));
}
function effectiveOpt(flow,qi,opt){
  if(opt!=='Other') return opt;
  if(flow==='meeting'){
    if(qi===0) return 'Zoom';
    if(qi===1) return 'Chrome';
    if(qi===2) return 'Notion';
  } else if(flow==='work'&&qi===0) return 'Chrome + Notion';
  else if(flow==='break'&&qi===0) return 'Watch YouTube';
  return opt;
}

function AIBuilder({onBack,accent,onSave}){
  const [phase,setPhase]=useState('welcome');
  const [msgs,setMsgs]=useState([]);
  const [answers,setAnswers]=useState({});
  const [locked,setLocked]=useState({});
  const [inp,setInp]=useState('');
  const [trigger,setTrigger]=useState(null);
  const [triggerCombo,setTriggerCombo]=useState(null);
  const [showTrigMenu,setShowTrigMenu]=useState(false);
  const [showShortcut,setShowShortcut]=useState(false);
  const [modalInitial,setModalInitial]=useState(null);
  const [showTryIt,setShowTryIt]=useState(false);
  const [extraSteps,setExtraSteps]=useState([]);
  const [showAddMenu,setShowAddMenu]=useState(false);
  const [flowType,setFlowType]=useState('start');
  const [otherPanel,setOtherPanel]=useState(null);
  const [addMode,setAddMode]=useState(null);
  const scRef=useRef();
  const answersRef=useRef({});

  const push=(msg,delay)=>new Promise(r=>setTimeout(()=>{
    setMsgs(p=>[...p,msg]);
    setTimeout(()=>{if(scRef.current)scRef.current.scrollTop=99999;},60);
    r();
  },delay));

  useEffect(()=>{
    if(phase==='result'){
      const t1=setTimeout(()=>{if(scRef.current)scRef.current.scrollTop=scRef.current.scrollHeight;},80);
      const t2=setTimeout(()=>{if(scRef.current)scRef.current.scrollTop=scRef.current.scrollHeight;},300);
      return()=>{clearTimeout(t1);clearTimeout(t2);};
    }
  },[phase]);

  const writeAns=(qi,val)=>{
    answersRef.current={...answersRef.current,[qi]:val};
    setAnswers({...answersRef.current});
  };

  const startChat=async(text, flow='start')=>{
    setPhase('chat');
    setFlowType(flow);
    answersRef.current={};
    setAnswers({});
    setLocked({});
    setExtraSteps([]);
    setMsgs([{r:'user',c:text}]);
    if(flow==='start'){
      await push({r:'ai',c:"Let's set up your work environment. A few quick questions:"},700);
      await push({r:'q',c:'Which apps do you use for deep work?',sub:'These might be the ones you use most',qi:0,multi:true,
        opts:START_COMMON_APPS, seeAll:true, seeAllFlow:'start'},400);
    } else if(flow==='clear'){
      await push({r:'ai',c:"Let's clear your desk. Which apps do you want to close?"},700);
      await push({r:'q',c:'',sub:'These are usually the ones you open for quick tasks',qi:0,multi:true,
        opts:['Preview','Pages','Excel','Calendar','Notes','Zoom'], seeAll:true, seeAllFlow:'clear'},400);
    }
  };

  const advanceAfter=async(qi)=>{
    const ans=answersRef.current;
    if(flowType==='start'){
      if(qi===0){
        await push({r:'ai',c:'Got it. Want some music?'},500);
        await push({r:'q',c:'',qi:1,multi:false,
          opts:['Spotify','Apple Music','YouTube Music','No music, thanks']},400);
      } else if(qi===1){
        const music=ans[1];
        const apps=ans[0]||[];
        const opts=[...apps];
        if(music && music!=='No music, thanks' && !opts.includes(music)) opts.push(music);
        await push({r:'ai',c:'Which app do you want to see first?'},500);
        await push({r:'q',c:'',qi:2,multi:false,opts},400);
      } else if(qi===2){
        await push({r:'ai',c:'Perfect — your Smart Action is ready.'},500);
        setTimeout(()=>setPhase('result'),850);
      }
    } else if(flowType==='clear'){
      if(qi===0){
        await push({r:'ai',c:'Which app do you want to see after clearing?'},500);
        await push({r:'q',c:'',qi:1,multi:false,
          opts:['Chrome','Notion','Desktop','Spotify','Other']},400);
      } else if(qi===1){
        await push({r:'ai',c:'Perfect — your Smart Action is ready.'},500);
        setTimeout(()=>setPhase('result'),850);
      }
    }
  };

  const pickChip=async(qi,opt,multi)=>{
    if(locked[qi]) return;
    if(opt==='Other'){ setOtherPanel({qi,multi}); return; }
    if(multi){
      const cur=answersRef.current[qi]||[];
      const next=cur.includes(opt)?cur.filter(x=>x!==opt):[...cur,opt];
      writeAns(qi,next);
      return;
    }
    writeAns(qi,opt);
    setLocked(p=>({...p,[qi]:true}));
    await push({r:'user',c:opt},0);
    await advanceAfter(qi);
  };

  const continueMulti=async(qi)=>{
    const cur=answersRef.current[qi]||[];
    if(!cur.length||locked[qi]) return;
    setLocked(p=>({...p,[qi]:true}));
    await push({r:'user',c:cur.join(', ')},0);
    await advanceAfter(qi);
  };

  const skipMulti=async(qi)=>{
    if(locked[qi]) return;
    const cur=answersRef.current[qi]||[];
    writeAns(qi,cur);
    setLocked(p=>({...p,[qi]:true}));
    await push({r:'user',c:cur.length?cur.join(', '):'(skipped)'},0);
    await advanceAfter(qi);
  };

  const addFromOther=async(picks)=>{
    if(!otherPanel) return;
    const {qi,multi,replace,advance}=otherPanel;
    setOtherPanel(null);
    if(multi){
      if(replace){
        writeAns(qi,picks);
      } else {
        const cur=answersRef.current[qi]||[];
        const merged=[...cur];
        for(const p of picks) if(!merged.includes(p)) merged.push(p);
        writeAns(qi,merged);
      }
      if(advance){
        setLocked(p=>({...p,[qi]:true}));
        await push({r:'user',c:picks.join(', ')},0);
        await push({r:'ai',c:`Got it — ${picks.join(', ')} added.`},500);
        await advanceAfter(qi);
      } else {
        await push({r:'ai',c:`Got it — ${picks.join(', ')} added.`},500);
      }
    } else {
      const pick=picks[0];
      writeAns(qi,pick);
      setLocked(p=>({...p,[qi]:true}));
      await push({r:'user',c:pick},0);
      await push({r:'ai',c:`Got it — ${pick} added.`},500);
      await advanceAfter(qi);
    }
  };

  const openSeeAll=(qi,flow)=>{
    const cur=answersRef.current[qi]||[];
    if(flow==='clear'){
      setOtherPanel({qi,multi:true,replace:true,advance:true,
        apps:CLEAR_ALL_APPS,preselected:cur,ctaLabel:'Confirm',
        modalTitle:'Select apps to close',
        modalSubtitle:'From the apps currently open on your computer'});
    } else {
      setOtherPanel({qi,multi:true,replace:true,advance:true,
        apps:buildStartAllApps(cur),preselected:cur,ctaLabel:'Confirm',
        modalTitle:'Choose from your apps',
        modalSubtitle:'From the apps scanned on your computer'});
    }
  };

  const handleSend=async()=>{
    if(!inp.trim()) return;
    if(addMode==='asking'){
      const txt=inp.trim();
      setInp('');
      await push({r:'user',c:txt},0);
      await push({r:'ai',c:"Great idea. In a real product, I'd add that to your Smart Action right now. But this is a prototype demo — that feature isn't fully built yet."},500);
      setAddMode('replied');
      setTimeout(()=>{setAddMode(null);setPhase('result');},1500);
      return;
    }
    if(phase==='welcome'){
      setInp('');
      setPhase('fallback');
      setTimeout(()=>setPhase('welcome'),2000);
      return;
    }
    startChat(inp.trim(),'start');
    setInp('');
  };

  const startAddMore=async()=>{
    setAddMode('asking');
    setPhase('chat');
    await push({r:'ai',c:'What would you like to add to your Smart Action?'},300);
  };

  const WELCOME=[
    {i:'🚀',title:'Start my work',sub:"Open what you need for the day ahead",flow:'start'},
    {i:'☕',title:'Clear my desk',sub:"Close what you're done with",flow:'clear'},
  ];

  if(phase==='welcome') return(
    <div style={{height:'100vh',background:BG,display:'flex',flexDirection:'column'}}>
      <PageHeader onBack={onBack}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 24px'}}>
        <div style={{maxWidth:620,width:'100%',textAlign:'center',marginBottom:40}}>
          <div style={{fontSize:44,color:accent,marginBottom:18,lineHeight:1}}>✦</div>
          <div style={{fontSize:11,fontWeight:600,color:accent,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:14}}>Smart Actions</div>
          <h2 style={{fontSize:34,fontWeight:700,letterSpacing:'-.04em',lineHeight:1.2,marginBottom:14}}>What would you like to automate?</h2>
          <p style={{color:T2,fontSize:14,lineHeight:1.7,maxWidth:460,margin:'0 auto'}}>Pick a scenario to get started, or describe your own.</p>
        </div>
        <div style={{display:'flex',gap:14,width:'100%',maxWidth:620,marginBottom:20}}>
          {WELCOME.map((w,i)=>(
            <div key={i} onClick={()=>startChat(w.title,w.flow)}
              style={{flex:1,display:'flex',flexDirection:'column',gap:10,
                background:S1,border:`1px solid ${BDR}`,borderRadius:14,padding:'28px 24px',
                cursor:'pointer',transition:'all .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=accent+'66';e.currentTarget.style.transform='translateY(-1px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=BDR;e.currentTarget.style.transform='none';}}>
              <div style={{fontSize:42,lineHeight:1,marginBottom:4}}>{w.i}</div>
              <div style={{fontSize:18,fontWeight:700,color:T1,letterSpacing:'-.02em'}}>{w.title}</div>
              <div style={{fontSize:13,color:T3,lineHeight:1.5}}>{w.sub}</div>
            </div>
          ))}
        </div>
        <div style={{width:'100%',maxWidth:620}}>
          <InputRow v={inp} sv={setInp} onS={handleSend} accent={accent}/>
        </div>
      </div>
    </div>
  );

  if(phase==='fallback') return(
    <div style={{height:'100vh',background:BG,display:'flex',flexDirection:'column'}}>
      <PageHeader onBack={onBack}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 24px'}}>
        <div style={{maxWidth:480,width:'100%',animation:'fadeIn .3s ease'}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
            <div style={{width:16,height:16,borderRadius:'50%',background:accent,display:'flex',alignItems:'center',
              justifyContent:'center',fontSize:8,color:'#000',fontWeight:700}}>✦</div>
            <span style={{fontSize:10,color:T3}}>Smart Actions</span>
          </div>
          <div style={{padding:'12px 14px',fontSize:13,lineHeight:1.6,
            borderRadius:'3px 10px 10px 10px',background:S2,color:T1,maxWidth:420}}>
            Great idea. In a real product, I'd build that for you right now. But this is a prototype demo — describing your own workflow isn't fully built yet. Try "Start my work" or "Clear my desk" to see how it works.
          </div>
        </div>
      </div>
    </div>
  );

  const computeResult=()=>{
    let RESULT_NAME, RESULT_STEPS, RESULT_APPS, BROUGHT_IDX=0;
    if(flowType==='clear'){
      RESULT_NAME='Clear my desk';
      const closeList=answers[0]||[];
      const surface=answers[1]||'Chrome';
      RESULT_STEPS=[`Switch to ${surface}`,...closeList.map(a=>`Close ${a}`)];
      const iconList=[labelToId(surface),...closeList.map(labelToId)];
      RESULT_APPS=[...new Set(iconList)];
    } else {
      RESULT_NAME='Start my work';
      const picked=answers[0]||[];
      const music=answers[1];
      const first=answers[2]||picked[0]||'Chrome';
      const isMusic=music && music!=='No music, thanks' && first===music;
      const rest=picked.filter(a=>a!==first);
      const firstStep=isMusic?`Play ${first}`:`Open ${first}`;
      RESULT_STEPS=[firstStep,...rest.map(a=>`Open ${a}`)];
      if(music && music!=='No music, thanks' && first!==music){
        RESULT_STEPS.push(`Play ${music}`);
      }
      const iconList=[labelToId(first),...rest.map(labelToId)];
      if(music && music!=='No music, thanks' && first!==music) iconList.push(labelToId(music));
      RESULT_APPS=[...new Set(iconList)];
    }
    if(extraSteps.length){
      RESULT_STEPS=[...RESULT_STEPS,...extraSteps];
    }
    return { RESULT_NAME, RESULT_STEPS, RESULT_APPS, BROUGHT_IDX };
  };

  const ResultCard=()=>{
    const {RESULT_NAME, RESULT_STEPS, RESULT_APPS, BROUGHT_IDX} = computeResult();
    return(
    <div style={{marginTop:14,animation:'fadeIn .4s ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:12}}>
        <div style={{width:18,height:18,borderRadius:'50%',background:accent,display:'flex',alignItems:'center',
          justifyContent:'center',fontSize:9,color:'#000',fontWeight:700}}>✦</div>
        <span style={{fontSize:12,color:T3}}>Smart Actions</span>
      </div>
      <div style={{background:S1,border:`1.5px solid ${accent}44`,borderRadius:14,padding:'22px',
        maxWidth:540,boxShadow:`0 0 24px ${accent}0a`}}>
        <div style={{display:'flex',gap:7,marginBottom:12}}>
          {RESULT_APPS.map(id=><AppDot key={id} appId={id} size={24}/>)}
        </div>
        <div style={{fontSize:17,fontWeight:600,letterSpacing:'-.01em',marginBottom:14,color:T1,lineHeight:1.4}}>{RESULT_NAME}</div>
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:16}}>
          {RESULT_STEPS.map((s,i)=>(
            <div key={i} style={{display:'flex',gap:11,alignItems:'center'}}>
              <div style={{width:22,height:22,borderRadius:'50%',flexShrink:0,background:accent+'18',
                border:`1px solid ${accent}44`,display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:11,color:accent,fontWeight:700}}>{i+1}</div>
              <span style={{fontSize:15,color:T1}}>{s}</span>
              {i===BROUGHT_IDX&&<span style={{fontSize:12,color:accent,fontStyle:'italic',marginLeft:4}}>← brought to front</span>}
            </div>
          ))}
        </div>
        {/* Trigger */}
        <div style={{marginBottom:14,position:'relative'}}>
          <div style={{fontSize:11,fontWeight:600,color:T3,letterSpacing:'.07em',textTransform:'uppercase',marginBottom:8}}>Trigger</div>
          <button onClick={()=>setShowTrigMenu(v=>!v)} style={{display:'flex',alignItems:'center',gap:10,width:'100%',
            background:S2,border:`1px solid ${showTrigMenu?accent:BDR}`,borderRadius:10,padding:'12px 16px',
            color:trigger?T1:T4,fontSize:14,fontWeight:500,fontFamily:'inherit',cursor:'pointer',textAlign:'left',transition:'border-color .15s'}}>
            {trigger&&<span style={{fontSize:15}}>{isKeyboardTrigger(trigger)?'⌨':'🖱'}</span>}
            <span style={{flex:1}}>{trigger||'Select your trigger'}</span>
            <span style={{color:T3}}>▾</span>
          </button>
          {showTrigMenu&&<div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,
            background:S2,border:`1px solid ${BDR}`,borderRadius:10,padding:6,zIndex:20,
            boxShadow:'0 10px 28px rgba(0,0,0,.7)'}}>
            {TRIGGERS.map(t=>{
              const kb=isKeyboardTrigger(t), active=t===trigger;
              return <div key={t} onClick={()=>{
                setShowTrigMenu(false);
                if(kb){setModalInitial(null);setShowShortcut(true);}
                else{setTrigger(t);setTriggerCombo(null);}
              }} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:8,
                cursor:'pointer',color:active?accent:T1,fontSize:14,transition:'background .12s'}}
                onMouseEnter={e=>e.currentTarget.style.background=S3}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <span>{kb?'⌨':'🖱'}</span>
                <span style={{flex:1}}>{t}</span>
                {active&&<span style={{color:accent,fontSize:15}}>✓</span>}
              </div>;
            })}
          </div>}
        </div>
        {/* Add more action */}
        <div style={{marginBottom:14}}>
          <button onClick={startAddMore} style={{display:'flex',alignItems:'center',
            justifyContent:'center',gap:7,width:'100%',background:'transparent',
            border:`1px dashed ${BDR}`,borderRadius:10,padding:'11px 16px',color:T2,fontSize:14,
            fontWeight:500,fontFamily:'inherit',cursor:'pointer',transition:'border-color .15s, color .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=accent;e.currentTarget.style.color=accent;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=BDR;e.currentTarget.style.color=T2;}}>
            + Add more action
          </button>
        </div>
        <div style={{display:'flex',gap:8}}>
          <GBtn onClick={()=>trigger&&setShowTryIt(true)} style={{flex:1,padding:'11px 0',textAlign:'center',fontSize:14,borderRadius:8,opacity:trigger?1:0.45,cursor:trigger?'pointer':'not-allowed'}}>Try it</GBtn>
          <PBtn ac={accent} disabled={!trigger} onClick={()=>onSave({
            name:RESULT_NAME,
            steps:RESULT_STEPS,
            apps:RESULT_APPS,
            trigger
          })} style={{flex:1,padding:'11px 0',fontSize:14,borderRadius:8}}>Save to My Actions</PBtn>
        </div>
      </div>
    </div>
    );
  };

  // Chat + result share one view
  if(phase==='chat'||phase==='result') return(
    <div style={{height:'100vh',background:BG,display:'flex',flexDirection:'column'}}>
      <PageHeader onBack={onBack}/>
      <div ref={scRef} style={{flex:1,overflowY:'auto',padding:'14px 0',display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div style={{width:'100%',maxWidth:640,padding:'0 24px',display:'flex',flexDirection:'column'}}>
          {msgs.map((msg,i)=>{
            const isU=msg.r==='user', isQ=msg.r==='q';
            const done=isQ&&!!locked[msg.qi];
            const multi=isQ&&!!msg.multi;
            const cur=isQ?answers[msg.qi]:undefined;
            const multiSel=multi?(Array.isArray(cur)?cur:[]):[];
            const useCard=multi&&!done;
            const prev=i>0?msgs[i-1]:null;
            const prevIsU=prev&&prev.r==='user';
            // Gap rules (Skill doc §01):
            //   first msg → 0
            //   useCard (msg → options card) → 12
            //   same side (both user or both AI) → 7
            //   different side → 16
            const mt=i===0?0:(useCard?12:(isU===prevIsU?7:16));
            return(
              <div key={i} style={{display:'flex',flexDirection:'column',
                alignItems:isU?'flex-end':'flex-start',marginTop:mt,animation:'fadeIn .2s ease'}}>
                {!isU&&<div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                  <div style={{width:16,height:16,borderRadius:'50%',background:accent,display:'flex',alignItems:'center',
                    justifyContent:'center',fontSize:8,color:'#000',fontWeight:700}}>✦</div>
                  <span style={{fontSize:12,color:T3}}>Smart Actions</span>
                </div>}
                {msg.c&&!useCard&&<div style={{maxWidth:420,padding:'14px 18px',fontSize:15,lineHeight:1.6,
                  borderRadius:isU?'18px 18px 4px 18px':'4px 18px 18px 18px',
                  background:isU?accent:S2,color:isU?'#000':T1}}>{msg.c}</div>}
                {msg.sub&&!useCard&&<div style={{maxWidth:420,marginTop:4,fontSize:15,color:T2,lineHeight:1.6}}>{msg.sub}</div>}
                {useCard&&<MultiSelectCard
                  accent={accent}
                  title={msg.c}
                  subtitle={msg.sub}
                  opts={msg.opts}
                  selected={multiSel}
                  onToggle={opt=>pickChip(msg.qi,opt,true)}
                  onSeeAll={msg.seeAll?()=>openSeeAll(msg.qi,msg.seeAllFlow||'start'):null}
                  seeAllLabel={msg.seeAllFlow==='clear'?'See all my open apps':'See all my apps'}
                  onContinue={()=>continueMulti(msg.qi)}
                  onSkip={()=>skipMulti(msg.qi)}
                  canContinue={multiSel.length>0}/>}
                {isQ&&!multi&&msg.opts.length>0&&<div style={{display:'flex',gap:10,marginTop:12,flexWrap:'wrap'}}>
                  {msg.opts.map(opt=>{
                    const ch=cur===opt;
                    return <button key={opt} onClick={()=>pickChip(msg.qi,opt,false)} disabled={done} style={{
                      padding:'11px 20px',borderRadius:22,fontSize:14,fontWeight:600,
                      border:`1.5px solid ${ch?accent:BDR}`,background:ch?accent+'18':S1,
                      color:done&&!ch?T3:T1,opacity:done&&!ch?.35:1,
                      cursor:done?'default':'pointer',fontFamily:'inherit',transition:'all .15s'}}
                      onMouseEnter={e=>{if(!done&&!ch){e.currentTarget.style.borderColor=accent+'99';e.currentTarget.style.background=accent+'14';}}}
                      onMouseLeave={e=>{if(!done&&!ch){e.currentTarget.style.borderColor=BDR;e.currentTarget.style.background=S1;}}}>{opt}</button>;
                  })}
                </div>}
              </div>
            );
          })}
          {phase==='result'&&<ResultCard/>}
        </div>
      </div>
      {phase==='chat'&&<div style={{padding:'12px 0',borderTop:`1px solid ${BDR}`,display:'flex',justifyContent:'center'}}>
        <div style={{width:'100%',maxWidth:640,padding:'0 24px'}}>
          <InputRow v={inp} sv={setInp} onS={handleSend} accent={accent}/>
        </div>
      </div>}
      {showShortcut&&<ShortcutModal accent={accent}
        initial={modalInitial}
        onConfirm={(s,c)=>{setTrigger(s);setTriggerCombo(c);setShowShortcut(false);}}
        onCancel={()=>setShowShortcut(false)}/>}
      {showTryIt&&trigger&&<TryItModal accent={accent} trigger={trigger} combo={triggerCombo}
        steps={computeResult().RESULT_STEPS} onClose={()=>setShowTryIt(false)}/>}
      {otherPanel&&<OtherModal accent={accent} multi={otherPanel.multi}
        preselected={otherPanel.preselected} apps={otherPanel.apps} ctaLabel={otherPanel.ctaLabel}
        modalTitle={otherPanel.modalTitle} modalSubtitle={otherPanel.modalSubtitle}
        onAdd={addFromOther} onCancel={()=>setOtherPanel(null)}/>}
    </div>
  );
}

/* ─── Root App ───────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#00d9b4"}/*EDITMODE-END*/;

function App(){
  const [screen,setScreen]=useState(()=>{
    try{return localStorage.getItem('sa3_screen')||'home';}catch{return 'home';}
  });
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [showTweaks,setShowTweaks]=useState(false);
  const [savedActions,setSavedActions]=useState([]);
  const [editAction,setEditAction]=useState(null);
  // Session-only flag: resets on full page reload. Once onboarding finishes,
  // the Smart Action icon on the home page jumps straight into the main page.
  const [hasScanned,setHasScanned]=useState(false);

  const nav=s=>{setScreen(s);try{localStorage.setItem('sa3_screen',s);}catch{}};

  const handleSave=(action)=>{
    setSavedActions(prev=>[{...action,id:Date.now(),enabled:true},...prev]);
    nav('main');
  };

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);

  const accent=tweaks.accentColor||'#00d9b4';
  const flows={
    home:       <HomeScreen onEnter={()=>nav(hasScanned?'main':'onboarding')} accent={accent}/>,
    onboarding: <OnboardingFlow onComplete={()=>{setHasScanned(true);nav('main');}} onBack={()=>nav('home')} accent={accent}/>,
    main:       <MainPage onOpenAI={()=>{setEditAction(null);nav('ai');}} onBack={()=>nav('home')}
                  accent={accent} savedActions={savedActions} setSavedActions={setSavedActions}
                  onEdit={a=>{setEditAction(a);nav('ai');}}/>,
    ai:         <AIBuilder onBack={()=>nav('main')} accent={accent} onSave={handleSave} editAction={editAction}/>,
  };

  return(
    <>
      <div key={screen} style={{position:'fixed',inset:0}} className="fade-in">
        {flows[screen]||flows.home}
      </div>
      {showTweaks&&(
        <div style={{position:'fixed',bottom:16,right:16,background:S1,border:`1px solid ${BDR}`,
          borderRadius:12,padding:16,zIndex:1000,width:200,boxShadow:'0 12px 40px rgba(0,0,0,.7)'}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:14}}>Tweaks</div>
          <div style={{fontSize:10,color:T3,marginBottom:7,textTransform:'uppercase',letterSpacing:'.06em',fontWeight:600}}>Accent color</div>
          <div style={{display:'flex',gap:6,marginBottom:16}}>
            {['#00d9b4','#6C8EFF','#FF6B8A','#FFB84D'].map(c=>(
              <div key={c} onClick={()=>{
                const t={...tweaks,accentColor:c};
                setTweaks(t);
                window.parent.postMessage({type:'__edit_mode_set_keys',edits:t},'*');
              }} style={{width:24,height:24,borderRadius:'50%',background:c,cursor:'pointer',
                border:tweaks.accentColor===c?'2.5px solid #fff':'2.5px solid transparent',transition:'border .15s'}}/>
            ))}
          </div>
          <div style={{fontSize:10,color:T3,marginBottom:7,textTransform:'uppercase',letterSpacing:'.06em',fontWeight:600}}>Jump to screen</div>
          {[['home','Home'],['onboarding','Onboarding'],['main','Main page'],['ai','AI Builder']].map(([s,l])=>(
            <button key={s} onClick={()=>nav(s)} style={{display:'block',width:'100%',textAlign:'left',
              padding:'6px 9px',borderRadius:6,marginBottom:2,background:screen===s?accent+'18':'transparent',
              border:'none',color:screen===s?accent:T2,fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>{l}</button>
          ))}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
